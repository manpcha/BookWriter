<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUNO's BOOK WRITER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
      }
      @keyframes energy-pulse {
        0% { filter: drop-shadow(0 0 2px #3b82f6); opacity: 0.8; }
        50% { filter: drop-shadow(0 0 12px #60a5fa); opacity: 1; }
        100% { filter: drop-shadow(0 0 2px #3b82f6); opacity: 0.8; }
      }
      .energy-arc {
        animation: energy-pulse 1.5s infinite ease-in-out;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      
      /* Hide browser default number input spinners */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
      
      /* A4 Page Simulation - 210mm x 297mm (794px x 1123px at 96dpi) */
      .a4-page {
        width: 794px; 
        height: 1123px;
        padding: 96px; /* 1 inch = 96px on all sides */
        margin: 0;
        background: white;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        box-sizing: border-box;
      }

      /* A4 Cover with ZERO MARGINS */
      .a4-cover {
        width: 794px; 
        height: 1123px;
        padding: 0;
        margin: 0;
        background: white;
        overflow: hidden;
        position: relative;
        box-sizing: border-box;
      }
      .a4-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      
      /* Content area that respects the 1-inch bottom margin */
      .toc-content-wrapper {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow: hidden;
        margin-bottom: 24px; /* Extra space before footer */
      }

      .chapter-item {
        border-bottom: 1.5px solid #e2e8f0;
        padding-bottom: 4px;
        margin-top: 12px;
      }

      .subtopic-item {
        font-size: 14.5px;
        font-weight: 500;
        color: #334155;
        margin-bottom: 0px;
        line-height: 1.4;
      }
      
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "jszip": "https://esm.sh/jszip@^3.10.1",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1"
  }
}
</script>
</head>
  <body class="bg-[#5da1e4] min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
